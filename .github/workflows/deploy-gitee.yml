name: Deploy to Gitee Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITEE_PAGES: 'true'

      - name: Push dist to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          if [ -z "$GITEE_TOKEN" ] || [ -z "$GITEE_REPO" ]; then
            echo "::error::Missing secrets. Add GITEE_TOKEN and GITEE_REPO in GitHub repo Settings > Secrets."
            echo "  GITEE_TOKEN = Gitee personal access token"
            echo "  GITEE_REPO  = username/repo-name (e.g. zhangsan/japan-otaku-map)"
            exit 1
          fi

          cd dist
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -b master
          git add -A
          git commit -m "deploy: $(date +%Y-%m-%d_%H:%M:%S) from GitHub Actions"
          git push --force "https://${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git" master:master

          echo "✅ Pushed to Gitee successfully!"
          echo "📌 Remember: Gitee Pages needs manual activation at:"
          echo "   https://gitee.com/${GITEE_REPO}/pages"
