<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSeek 余额监控</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #1e293b;
    border-radius: 16px;
    padding: 32px;
    width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    border: 1px solid #334155;
  }
  h1 {
    font-size: 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  h1 span { font-size: 24px; }
  label {
    display: block;
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid #475569;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 14px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #6366f1; }
  button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #6366f1;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 20px;
  }
  button:hover { background: #818cf8; }
  button:disabled { background: #475569; cursor: not-allowed; }
  .balance-box {
    background: #0f172a;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    display: none;
  }
  .balance-box.show { display: block; }
  .balance-box .amount {
    font-size: 36px;
    font-weight: 800;
    background: linear-gradient(135deg, #6366f1, #a5b4fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 8px 0;
  }
  .balance-box .label {
    font-size: 13px;
    color: #94a3b8;
  }
  .balance-box .meta {
    display: flex;
    justify-content: space-between;
    margin-top: 16px;
    font-size: 12px;
    color: #64748b;
  }
  .error {
    background: #450a0a;
    border: 1px solid #dc2626;
    border-radius: 10px;
    padding: 12px;
    font-size: 13px;
    color: #fca5a5;
    display: none;
    margin-bottom: 16px;
  }
  .error.show { display: block; }
  .api-hint {
    font-size: 11px;
    color: #64748b;
    margin-top: 12px;
    text-align: center;
  }
  .api-hint a { color: #818cf8; }
  .refresh {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 12px;
    color: #64748b;
    margin-top: 8px;
  }
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #475569;
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <h1><span>🪙</span> DeepSeek 余额</h1>

  <label for="apiKey">API Key</label>
  <input id="apiKey" type="password" placeholder="sk-xxxxxxxxxxxxxxxx"
         autocomplete="off" spellcheck="false">

  <button id="checkBtn" onclick="checkBalance()">查询余额</button>

  <div id="error" class="error"></div>

  <div id="balanceBox" class="balance-box">
    <div class="label">可用余额</div>
    <div class="amount" id="balanceAmount">—</div>
    <div class="meta">
      <span id="isAvailable"></span>
      <span id="lastChecked"></span>
    </div>
  </div>

  <div class="api-hint">
    需要 <a href="https://platform.deepseek.com/api_keys" target="_blank">DeepSeek API Key</a> · Key 仅存本地
  </div>
</div>

<script>
const STORAGE_KEY = 'ds_balance_key';
const input = document.getElementById('apiKey');
const btn = document.getElementById('checkBtn');
const errorEl = document.getElementById('error');
const balanceBox = document.getElementById('balanceBox');

// 恢复之前保存的 key
const saved = localStorage.getItem(STORAGE_KEY);
if (saved) {
  input.value = saved;
  checkBalance();
}

async function checkBalance() {
  const apiKey = input.value.trim();
  if (!apiKey) {
    showError('请输入 API Key');
    return;
  }

  localStorage.setItem(STORAGE_KEY, apiKey);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 查询中...';
  hideError();
  balanceBox.classList.remove('show');

  try {
    const res = await fetch('https://api.deepseek.com/user/balance', {
      headers: { 'Authorization': `Bearer ${apiKey}` }
    });

    if (!res.ok) {
      const text = await res.text();
      throw new Error(text || `HTTP ${res.status}`);
    }

    const data = await res.json();
    renderBalance(data);
  } catch (e) {
    showError(e.message.includes('Failed to fetch')
      ? '网络请求失败，请检查网络或尝试使用代理'
      : e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '刷新余额';
  }
}

function renderBalance(data) {
  const info = data.balance_infos?.[0] || data;
  const currency = info?.currency || 'CNY';
  const balance = info?.total_balance ?? data.total_balance ?? data.balance;
  const granted = info?.total_granted ?? data.total_granted;
  const toppedUp = info?.topped_up_balance ?? data.topped_up_balance;

  document.getElementById('balanceAmount').textContent =
    `${balance !== undefined ? Number(balance).toFixed(2) : '—'} ${currency}`;

  const parts = [];
  if (toppedUp !== undefined) parts.push(`充值 ${Number(toppedUp).toFixed(2)}`);
  if (granted !== undefined) parts.push(`赠送 ${Number(granted).toFixed(2)}`);
  document.getElementById('isAvailable').textContent = parts.join(' · ') || '';

  const now = new Date();
  document.getElementById('lastChecked').textContent =
    `更新于 ${now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;

  balanceBox.classList.add('show');
}

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.classList.add('show');
}
function hideError() {
  errorEl.classList.remove('show');
}

// 每 5 分钟自动刷新
setInterval(() => {
  const key = input.value.trim();
  if (key && balanceBox.classList.contains('show')) checkBalance();
}, 300000);
</script>
</body>
</html>
