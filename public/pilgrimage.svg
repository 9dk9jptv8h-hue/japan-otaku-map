<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="pil-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE0B2"/>
      <stop offset="40%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <linearGradient id="pil-torii" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d32f2f"/>
      <stop offset="100%" stop-color="#f44336"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="400" height="300" fill="url(#pil-sky)"/>
  <!-- 地面 -->
  <rect x="0" y="220" width="400" height="80" fill="#a5d6a7"/>
  <!-- 鳥居の柱 -->
  <rect x="120" y="60" width="18" height="220" rx="2" fill="url(#pil-torii)"/>
  <rect x="262" y="60" width="18" height="220" rx="2" fill="url(#pil-torii)"/>
  <!-- 鳥居の笠木（上の横棒）-->
  <rect x="90" y="55" width="220" height="22" rx="4" fill="url(#pil-torii)"/>
  <rect x="90" y="52" width="220" height="16" rx="3" fill="#b71c1c"/>
  <!-- 鳥居の貫（下の横棒）-->
  <rect x="110" y="110" width="180" height="14" rx="2" fill="url(#pil-torii)"/>
  <!-- 鳥居の額束（中央小柱）-->
  <rect x="195" y="88" width="10" height="24" rx="2" fill="#b71c1c"/>
  <!-- 階段 -->
  <rect x="100" y="240" width="200" height="12" rx="1" fill="#e0e0e0"/>
  <rect x="110" y="252" width="180" height="12" rx="1" fill="#ccc"/>
  <rect x="120" y="264" width="160" height="12" rx="1" fill="#bdbdbd"/>
  <rect x="130" y="276" width="140" height="12" rx="1" fill="#9e9e9e"/>
  <!-- 桜の花びら -->
  <circle cx="80" cy="140" r="5" fill="#fce4ec" opacity="0.9"/>
  <ellipse cx="80" cy="136" rx="5" ry="3" fill="#f8bbd0" opacity="0.7"/>
  <circle cx="310" cy="100" r="5" fill="#fce4ec" opacity="0.9"/>
  <ellipse cx="310" cy="96" rx="5" ry="3" fill="#f8bbd0" opacity="0.7"/>
  <circle cx="330" cy="150" r="4" fill="#fce4ec" opacity="0.8"/>
  <ellipse cx="330" cy="147" rx="4" ry="2.5" fill="#f8bbd0" opacity="0.6"/>
  <!-- 山 -->
  <polygon points="0,220 60,120 120,220" fill="#81c784" opacity="0.6"/>
  <polygon points="280,220 340,140 400,220" fill="#81c784" opacity="0.6"/>
</svg>
